[package]
edition = "2024"

name = "floria"
description = "Floria data system for cloud orchestration"
version = "0.0.1"
rust-version = "1.85"

license = "MIT OR Apache-2.0"
repository = "https://github.com/tliron/rust-floria"
documentation = "https://docs.rs/floria"
authors = ["Tal Liron"]

readme = "../../README.md"

categories = [] # https://crates.io/category_slugs
keywords = [
    "cloud",
    "orchestration",
    "wasm",
    "tosca",
    "floria",
    "puccini",
    "khutulun",
]

[dependencies]
ahash = "0.8.11"
compris = { version = "0.0.3", features = ["serde"] }
kutil-cli = { version = "0.0.4", features = ["derive"] }
kutil-std = "0.0.2"
ordered-float = { optional = true, version = "5.0.0" }
papaya = "0.2.0"
thiserror = "2.0.11"
tracing = "0.1.41"
# https://docs.rs/wasmtime/latest/wasmtime/index.html#crate-features
wasmtime = { optional = true, version = "30.0.2", default-features = false, features = [
    "cranelift",
    "parallel-compilation",
    "pooling-allocator",
] }
wasmtime-wasi = { optional = true, version = "30.0.2" }

[features]
plugins = ["dep:ordered-float", "dep:wasmtime", "dep:wasmtime-wasi"]
wasm_debug = [
    "wasmtime/demangle",
    "wasmtime/profiling",
    "wasmtime/coredump",
    "wasmtime/addr2line",
    "wasmtime/debug-builtins",
]
